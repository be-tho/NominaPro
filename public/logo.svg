<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="gradientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5f3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="100" fill="url(#gradientBg)" opacity="0.1"/>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradientBg)"/>
  
  <!-- Calendar grid (representing attendance tracking) -->
  <rect x="45" y="50" width="110" height="100" rx="8" fill="rgba(255,255,255,0.15)" stroke="url(#gradientAccent)" stroke-width="2"/>
  
  <!-- Calendar header -->
  <rect x="45" y="50" width="110" height="20" rx="8" fill="url(#gradientAccent)" opacity="0.3"/>
  
  <!-- Calendar grid lines -->
  <line x1="65" y1="73" x2="155" y2="73" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="65" y1="91" x2="155" y2="91" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="65" y1="109" x2="155" y2="109" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="65" y1="127" x2="155" y2="127" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Day cells -->
  <rect x="50" y="58" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  <rect x="68" y="58" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  <rect x="86" y="58" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.6"/>
  <rect x="104" y="58" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  
  <rect x="50" y="76" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.6"/>
  <rect x="68" y="76" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  <rect x="86" y="76" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  <rect x="104" y="76" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.6"/>
  
  <rect x="50" y="94" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  <rect x="68" y="94" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  <rect x="86" y="94" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  <rect x="104" y="94" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  
  <rect x="50" y="112" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.6"/>
  <rect x="68" y="112" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  <rect x="86" y="112" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.6"/>
  <rect x="104" y="112" width="12" height="12" rx="2" fill="url(#gradientAccent)" opacity="0.8"/>
  
  <!-- Check mark overlay (acceptance/completion) -->
  <circle cx="135" cy="135" r="20" fill="rgba(255,255,255,0.2)" stroke="url(#gradientAccent)" stroke-width="2"/>
  <path d="M128 135L133 140L143 130" stroke="url(#gradientAccent)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
